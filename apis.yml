image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: >-
  Amazon CloudFormation is an infrastructure as code service that allows you to
  model, provision, and manage AWS and third-party resources by treating
  infrastructure as code. CloudFormation enables you to use a template file to
  create and delete a collection of resources together as a single unit (a
  stack), automating the provisioning and updating of your infrastructure in an
  orderly and predictable fashion.
